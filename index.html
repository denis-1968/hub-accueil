<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Hub – Mes Sites</title>
  <!-- Icône pour iPad / iPhone (écran d'accueil) -->
  <link rel="apple-touch-icon" href="images/icon.jpeg" />
  <link rel="apple-touch-icon" sizes="152x152" href="images/icon.jpeg" />
  <link rel="apple-touch-icon" sizes="167x167" href="images/icon.jpeg" />
  <link rel="apple-touch-icon" sizes="180x180" href="images/icon.jpeg" />
  <link rel="shortcut icon" href="images/icon.jpeg" type="image/jpeg" />
  <meta name="apple-mobile-web-app-title" content="Hub" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      background-color: #1a0a2e;
      background-image: var(--bg-image, none);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transition: background-image 0.5s ease, background-color 0.5s ease;
      position: relative;
      overflow: hidden;
    }

    /* Overlay semi-transparent pour lisibilité */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(10, 5, 25, 0.45);
      pointer-events: none;
      z-index: 0;
    }

    /* ===== CONTENEUR PRINCIPAL ===== */
    .hub {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      padding: 0;
      width: 100%;
      max-width: 1100px;
    }

    /* ===== TITRE ===== */
    .hub-title {
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      font-weight: 700;
      color: #fff;
      text-align: center;
      letter-spacing: 0.06em;
      text-shadow: 0 0 18px rgba(180, 100, 255, 0.8), 0 2px 8px rgba(0,0,0,0.6);
    }

    /* ===== GRILLE DES BOUTONS ===== */
    .buttons-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2.5rem;
    }

    /* ===== BOUTON-IMAGE ===== */
    .site-btn {
      display: block;
      width: clamp(200px, 28vw, 300px);
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      border: 3px solid rgba(255,255,255,0.15);
      box-shadow:
        0 0 20px rgba(150, 80, 255, 0.5),
        0 0 50px rgba(100, 50, 200, 0.25);
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      position: relative;
    }

    .site-btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }

    .site-btn:hover {
      transform: scale(1.08) translateY(-6px);
      box-shadow:
        0 0 35px rgba(200, 120, 255, 0.8),
        0 0 70px rgba(150, 80, 255, 0.4);
      border-color: rgba(255,255,255,0.5);
    }

    .site-btn:hover img {
      transform: scale(1.05);
    }

    /* Anneau lumineux animé au survol */
    .site-btn::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        transparent 0%,
        rgba(180, 100, 255, 0.6) 25%,
        rgba(100, 180, 255, 0.6) 50%,
        rgba(255, 120, 80, 0.6) 75%,
        transparent 100%
      );
      opacity: 0;
      transition: opacity 0.3s ease;
      animation: spin 3s linear infinite;
      z-index: -1;
    }

    .site-btn:hover::after {
      opacity: 1;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ===== BOUTON RAFRAÎCHISSEMENT ===== */
    .refresh-btn {
      position: fixed;
      top: 1.2rem;
      right: 1.2rem;
      z-index: 100;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      overflow: hidden;
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      box-shadow: 0 0 16px rgba(80, 180, 200, 0.5);
      transition: transform 0.4s ease, box-shadow 0.3s ease;
    }

    .refresh-btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.6s ease;
    }

    .refresh-btn:hover {
      box-shadow: 0 0 28px rgba(80, 200, 220, 0.8);
    }

    .refresh-btn:hover img {
      transform: rotate(360deg);
    }

    .refresh-btn:active img {
      transform: rotate(720deg);
      transition: transform 0.4s ease;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      .buttons-grid { gap: 1.5rem; }
    }
  </style>
</head>
<body>

  <main class="hub">
    <div class="buttons-grid">
      <!-- Bouton FDR -->
      <a class="site-btn" id="btn-fdr" href="#" target="_blank" rel="noopener" title="FDR">
        <img src="images/fdr.jpeg" alt="FDR" />
      </a>

      <!-- Bouton Traces -->
      <a class="site-btn" id="btn-traces" href="#" target="_blank" rel="noopener" title="Traces">
        <img src="images/traces.jpeg" alt="Traces" />
      </a>

    </div>
  </main>

  <!-- ===== BOUTON RAFRAÎCHISSEMENT ===== -->
  <button class="refresh-btn" onclick="location.reload()" title="Rafraîchir la page">
    <img src="images/refresh.png" alt="Rafraîchir" />
  </button>


  <script>
    // ===== CONFIGURATION DES LIENS (à modifier) =====
    const LINKS = {
      fdr:       'https://fdr.manus.space',
      traces:    'https://traces.manus.space'
    };

    document.getElementById('btn-fdr').href       = LINKS.fdr;
    document.getElementById('btn-traces').href    = LINKS.traces;

  </script>

</body>
</html>
